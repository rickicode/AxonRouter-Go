name: Release

# Build cross-platform binaries and publish a GitHub Release with changelog notes.
# Trigger: push a tag matching v* (e.g. v1.2.3).
# The Makefile and scripts/ folder can still drive a local release bump; this
# workflow syncs the version and changelog from the pushed tag, builds, and
# attaches assets to the release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: ""

jobs:
  build:
    name: 🖥️ Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7.0.0

      - name: 🔖 Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version ${VERSION} from tag ${TAG}."

      - name: 📌 Sync version and changelog from tag
        run: node scripts/sync-release-from-tag.js

      - name: ⚙️ Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.23"
          cache: true

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: 🧪 Verify README changelog sync
        run: node scripts/update-readme.js --check

      - name: 📦 Install frontend dependencies
        working-directory: web
        run: npm install

      - name: 🎨 Build frontend
        run: make build-frontend

      - name: 🔨 Build backend binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: make release-binary

      - name: 🏷️ Compute binary name
        id: bin
        run: |
          BIN="./build/axonrouter-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN="${BIN}.exe"; fi
          echo "name=${BIN}" >> "$GITHUB_OUTPUT"
          echo "- Built: ${BIN}" >> "$GITHUB_STEP_SUMMARY"

      - name: 📝 Prepare release notes
        env:
          GITHUB_ACTIONS: "true"
        run: |
          node scripts/prepare-release-notes.js
          echo "- Release notes source: $(grep -oP '(?<=Release notes source: ).*' RELEASE_NOTES.md || echo 'unknown')" >> "$GITHUB_STEP_SUMMARY"

      - name: 🚀 Publish GitHub Release v${{ steps.version.outputs.version }}
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: Release v${{ steps.version.outputs.version }}
          files: ${{ steps.bin.outputs.name }}
          body_path: RELEASE_NOTES.md
          append_body: false
