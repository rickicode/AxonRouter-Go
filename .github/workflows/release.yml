name: Release

# Build cross-platform binaries and attach them to a GitHub Release.
# Trigger: push a tag matching v* (e.g. v1.2.3). Create the release from
# the "Releases" page (Draft a new release, set the tag to vX.Y.Z) and the
# workflow runs automatically. The `installer.sh` script downloads the asset
# that matches the runner's OS/architecture.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.23"

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Compute binary name
        id: bin
        run: |
          BIN="axonrouter-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN="${BIN}.exe"; fi
          echo "name=${BIN}" >> "$GITHUB_OUTPUT"

      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o "${{ steps.bin.outputs.name }}" ./cmd/server

      - name: Upload release asset
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: ${{ steps.bin.outputs.name }}
          # Tag-triggered releases already exist; append assets to it.
          append_body: false
