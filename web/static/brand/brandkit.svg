<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" fill="none" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="g-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="g-loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="g-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="g-mesh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007cf0"/>
      <stop offset="25%" stop-color="#00dfd8"/>
      <stop offset="45%" stop-color="#7928ca"/>
      <stop offset="65%" stop-color="#ff0080"/>
      <stop offset="85%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#f9cb28"/>
    </linearGradient>
    <radialGradient id="g-atmo" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="60%" stop-color="#0f0f12"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <filter id="g-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="c-card"><rect width="1200" height="1000" rx="0"/></clipPath>

    <!-- reusable logo mark -->
    <symbol id="mark" viewBox="0 0 64 64">
      <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#g-tile)"/>
      <path d="M14 32 C14 18 28 18 32 32 C36 46 50 46 50 32"
            stroke="url(#g-loop)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.96"/>
      <circle cx="32" cy="32" r="4.6" fill="#ff0080" filter="url(#g-glow)"/>
      <circle cx="32" cy="32" r="2.4" fill="#ffffff"/>
    </symbol>
  </defs>

  <g clip-path="url(#c-card)">
    <!-- canvas -->
    <rect width="1200" height="1000" fill="#0f0f12"/>

    <!-- top hairline + label -->
    <line x1="48" y1="48" x2="1152" y2="48" stroke="#27272a" stroke-width="1"/>
    <text x="48" y="36" font-size="12" letter-spacing="3" fill="#71717a">AXONROUTER — BRAND SYSTEM</text>
    <text x="1152" y="36" font-size="12" letter-spacing="2" fill="#71717a" text-anchor="end">v2 / 2026</text>

    <!-- ============ 3×3 GRID ============ -->
    <!-- gutter 28, panel 368×300, start x:48/444/840 y:88/408/728 -->

    <!-- 1. LOGO COVER -->
    <rect x="48" y="88" width="368" height="300" rx="18" fill="#18181b"/>
    <use href="#mark" x="184" y="132" width="96" height="96"/>
    <text x="232" y="280" font-size="30" font-weight="700" letter-spacing="-0.8" fill="#fafafa" text-anchor="middle">Axon<tspan fill="url(#g-word)">Router</tspan></text>
    <text x="232" y="310" font-size="11" letter-spacing="3" fill="#6b6b76" text-anchor="middle">UNIVERSAL API PROXY</text>

    <!-- 2. LOGO CONSTRUCTION -->
    <rect x="444" y="88" width="368" height="300" rx="18" fill="#18181b"/>
    <g transform="translate(444,88)">
      <circle cx="184" cy="150" r="78" stroke="#27272a" stroke-width="1" fill="none"/>
      <circle cx="184" cy="150" r="52" stroke="#27272a" stroke-width="1" fill="none"/>
      <line x1="106" y1="150" x2="262" y2="150" stroke="#27272a" stroke-width="1"/>
      <line x1="184" y1="72" x2="184" y2="228" stroke="#27272a" stroke-width="1"/>
      <use href="#mark" x="136" y="102" width="96" height="96"/>
      <circle cx="184" cy="150" r="4" fill="#ff0080" opacity="0.5"/>
      <text x="184" y="270" font-size="11" letter-spacing="3" fill="#6b6b76" text-anchor="middle">CONSTRUCTION — 14PX GRID</text>
    </g>

    <!-- 3. DIGITAL APPLICATION (terminal) -->
    <rect x="840" y="88" width="368" height="300" rx="18" fill="#18181b"/>
    <g transform="translate(840,108)">
      <rect x="20" y="16" width="328" height="220" rx="12" fill="#0c0c10"/>
      <circle cx="42" cy="38" r="5" fill="#3a3a44"/><circle cx="62" cy="38" r="5" fill="#3a3a44"/><circle cx="82" cy="38" r="5" fill="#3a3a44"/>
      <text x="40" y="82" font-size="13" fill="#a1a1aa" font-family="Geist Mono, ui-monospace, Menlo, monospace">$ curl -fsSL axon.sh | bash</text>
      <text x="40" y="110" font-size="13" fill="#6b6b76" font-family="Geist Mono, ui-monospace, Menlo, monospace">==&gt; linux/amd64 detected</text>
      <text x="40" y="138" font-size="13" fill="#6b6b76" font-family="Geist Mono, ui-monospace, Menlo, monospace">==&gt; installed /usr/local/bin/axonrouter</text>
      <rect x="40" y="158" width="96" height="22" rx="6" fill="#ec489925"/>
      <text x="48" y="173" font-size="11" font-weight="600" fill="#ec4899" font-family="Geist Mono, ui-monospace, Menlo, monospace">ready :3777</text>
      <text x="184" y="268" font-size="11" letter-spacing="3" fill="#6b6b76" text-anchor="middle">DASHBOARD · TERMINAL</text>
    </g>

    <!-- 4. BRAND ESSENCE -->
    <rect x="48" y="408" width="368" height="300" rx="18" fill="#18181b"/>
    <text x="74" y="502" font-size="38" font-weight="600" letter-spacing="-1.2" fill="#fafafa">Route</text>
    <text x="74" y="550" font-size="38" font-weight="600" letter-spacing="-1.2" fill="#fafafa">every model.</text>
    <text x="74" y="598" font-size="38" font-weight="600" letter-spacing="-1.2" fill="url(#g-word)">Never stop.</text>
    <text x="74" y="650" font-size="12" letter-spacing="2" fill="#6b6b76" font-family="Geist Mono, ui-monospace, Menlo, monospace">ONE PORT · ALL FORMATS · ALWAYS ON</text>

    <!-- 5. COLOR SYSTEM -->
    <rect x="444" y="408" width="368" height="300" rx="18" fill="#18181b"/>
    <g transform="translate(444,408)">
      <rect x="20" y="30" width="78" height="78" rx="14" fill="#ec4899"/>
      <rect x="124" y="30" width="78" height="78" rx="14" fill="#db2777"/>
      <rect x="228" y="30" width="78" height="78" rx="14" fill="#ff0080"/>

      <rect x="20" y="124" width="78" height="78" rx="14" fill="#0f0f12" stroke="#27272a" stroke-width="1"/>
      <rect x="124" y="124" width="78" height="78" rx="14" fill="#18181b" stroke="#27272a" stroke-width="1"/>
      <rect x="228" y="124" width="78" height="78" rx="14" fill="#1e1e22" stroke="#27272a" stroke-width="1"/>

      <rect x="20" y="226" width="328" height="44" rx="10" fill="url(#g-mesh)"/>
      <text x="184" y="268" font-size="11" letter-spacing="3" fill="#6b6b76" text-anchor="middle">PRIMARY · NEUTRALS · MESH</text>
    </g>

    <!-- 6. TYPOGRAPHY -->
    <rect x="840" y="408" width="368" height="300" rx="18" fill="#18181b"/>
    <text x="864" y="470" font-size="12" letter-spacing="2" fill="#6b6b76">PRIMARY — SANS</text>
    <text x="864" y="532" font-size="44" font-weight="600" letter-spacing="-1.5" fill="#fafafa">AxonRouter</text>
    <text x="864" y="586" font-size="12" letter-spacing="2" fill="#6b6b76">SECONDARY — MONO</text>
    <text x="864" y="626" font-size="22" fill="#a1a1aa" font-family="Geist Mono, ui-monospace, Menlo, monospace">openai/ claude/ cx/</text>

    <!-- 7. PHYSICAL APPLICATION (badge) -->
    <rect x="48" y="728" width="368" height="244" rx="18" fill="#18181b"/>
    <g transform="translate(48,728)">
      <rect x="60" y="50" width="248" height="92" rx="14" fill="#1e1e22" stroke="#27272a" stroke-width="1"/>
      <use href="#mark" x="84" y="68" width="56" height="56"/>
      <text x="156" y="100" font-size="18" font-weight="700" fill="#fafafa">v2.0.0</text>
      <text x="156" y="120" font-size="11" letter-spacing="2" fill="#6b6b76">RELEASE TAG</text>
      <rect x="130" y="162" width="108" height="34" rx="17" fill="url(#g-tile)"/>
      <text x="184" y="184" font-size="13" font-weight="700" fill="#fafafa" text-anchor="middle">axonrouter</text>
    </g>

    <!-- 8. IMAGE DIRECTION (atmosphere) -->
    <rect x="444" y="728" width="368" height="244" rx="18" fill="#18181b"/>
    <g transform="translate(444,728)">
      <rect width="368" height="244" rx="18" fill="url(#g-atmo)"/>
      <!-- signal routes -->
      <path d="M0 180 C 80 100 160 260 240 180 S 368 130 368 190" stroke="#db2777" stroke-width="1.5" fill="none" opacity="0.35"/>
      <path d="M0 150 C 80 80 160 210 240 150 S 368 100 368 150" stroke="#ec4899" stroke-width="1.5" fill="none" opacity="0.25"/>
      <!-- mesh band -->
      <rect x="0" y="120" width="368" height="80" fill="url(#g-mesh)" opacity="0.15"/>
      <circle cx="290" cy="92" r="5" fill="#ff0080" filter="url(#g-glow)"/>
      <text x="24" y="222" font-size="11" letter-spacing="3" fill="#6b6b76">ATMOSPHERE — ROUTED SIGNAL</text>
    </g>

    <!-- 9. SYSTEM DETAIL (icon row) -->
    <rect x="840" y="728" width="368" height="244" rx="18" fill="#18181b"/>
    <g transform="translate(840,728)">
      <use href="#mark" x="24" y="46" width="56" height="56"/>
      <rect x="104" y="46" width="56" height="56" rx="14" fill="#1e1e22" stroke="#27272a" stroke-width="1"/>
      <rect x="184" y="46" width="56" height="56" rx="14" fill="#1e1e22" stroke="#27272a" stroke-width="1"/>
      <rect x="264" y="46" width="56" height="56" rx="14" fill="#1e1e22" stroke="#27272a" stroke-width="1"/>
      <!-- mini route lines on secondary tiles -->
      <path d="M116 74 C116 60 128 60 132 74 C136 88 148 88 148 74" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.45"/>
      <circle cx="198" cy="74" r="3" fill="#ff0080"/>
      <path d="M284 62 L296 74 L284 86" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
      <text x="24" y="138" font-size="11" letter-spacing="3" fill="#9aa0aa">ICON · TILE · LOOP · PULSE</text>
      <rect x="24" y="162" width="320" height="42" rx="10" fill="#0c0c10"/>
      <text x="40" y="188" font-size="13" fill="#a1a1aa" font-family="Geist Mono, ui-monospace, Menlo, monospace">openai · claude · cx · kiro · ag · cf</text>
    </g>

    <!-- footer -->
    <line x1="48" y1="988" x2="1152" y2="988" stroke="#27272a" stroke-width="1"/>
    <text x="48" y="978" font-size="11" letter-spacing="2" fill="#4a4a54">AXONROUTER-GO</text>
    <text x="1152" y="978" font-size="11" letter-spacing="2" fill="#4a4a54" text-anchor="end">© 2026</text>
  </g>
</svg>