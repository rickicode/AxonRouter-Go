<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="wmTile" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="wmLoop" x1="14" y1="32" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="wmWord" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="wmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- glyph -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#wmTile)"/>
  <path d="M14 32 C14 18 28 18 32 32 C36 46 50 46 50 32"
        stroke="url(#wmLoop)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.96"/>
  <circle cx="32" cy="32" r="4.6" fill="#ff0080" filter="url(#wmGlow)"/>
  <circle cx="32" cy="32" r="2.4" fill="#ffffff"/>

  <!-- wordmark -->
  <text x="72" y="43" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.7" fill="#fafafa">Axon<tspan fill="url(#wmWord)">Router</tspan></text>
</svg>