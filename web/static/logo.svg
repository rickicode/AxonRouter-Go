  <line x1="29.5" y1="8.5" x2="26" y2="5" stroke="#f9a8d4" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="34.5" y1="8.5" x2="38" y2="5" stroke="#f9a8d4" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
