<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="axTile" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="axLoop" x1="14" y1="32" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square app tile (100% different from the old radial synapse) -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#axTile)"/>

  <!-- Continuous routing loop: infinite path = always-on proxying, no triangles -->
  <path d="M22 40
           C 22 28 32 28 32 32
           C 32 36 42 36 42 24
           C 42 14 22 16 22 30
           C 22 44 42 46 42 40"
        stroke="url(#axLoop)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Active pulse riding the route -->
  <circle cx="32" cy="32" r="4.2" fill="#ff0080"/>
</svg>
